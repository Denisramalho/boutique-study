name: Release
on:
    push:
      tags:
        - 'v*.*.*'
    workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }} 
    
jobs:
    release:
        env:
          registry: ghcr.io
          image_name: denisramalho/product-catalog-service
        permissions:
          contents: read
          packages: write
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: src/productcatalogservice
        steps:
          - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
          - run: TAG=${GITHUB_REF#refs/tags/}
          - name: Build Docker Image
            run: IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          - run: docker build -t ${{env.registry}}/${{env.image_name}}:${TAG} .
          - run: docker tag ${{env.registry}}/${{env.image_name}}:${TAG} ${{env.registry}}/${{env.image_name}}:latest
          - run: docker tag ${{env.registry}}/${{env.image_name}}:${TAG} ${{env.registry}}/${{env.image_name}}:${MAJOR}
          - run: docker tag ${{env.registry}}/${{env.image_name}}:${TAG} ${{env.registry}}/${{env.image_name}}:${MAJOR}.${MINOR}
          - run: docker tag ${{env.registry}}/${{env.image_name}}:${TAG} ${{env.registry}}/${{env.image_name}}:${MAJOR}.${MINOR}.${PATCH}  
          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v4.1.0 # v4.1.0
            with:
              registry: ${{ env.registry }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
          - name: Push Docker Image
            run: docker push ${{env.registry}}/${{env.image_name}}:${TAG}
          - run: docker push ${{env.registry}}/${{env.image_name}}:latest
          - run: docker push ${{env.registry}}/${{env.image_name}}:${MAJOR}
          - run: docker push ${{env.registry}}/${{env.image_name}}:${MAJOR}.${MINOR}
          - run: docker push ${{env.registry}}/${{env.image_name}}:${MAJOR}.${MINOR}.${PATCH}
          
            


