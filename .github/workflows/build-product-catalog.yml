name: Product Catalog - CI
on:
    push:
    workflow_dispatch: 
    
jobs:
    build_product_catalog:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: src/productcatalogservice
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                 go-version-file: 'src/productcatalogservice/go.mod'
                 cache-dependency-path: 'src/productcatalogservice/go.sum'
            - name: Install dependencies
              run: go mod download

            - name: Build application
              run: go build

            - name: Run Tests
              run: go test -v -race
    golangci:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v6
          - name: Setup Go
            uses: actions/setup-go@v6
            with:
                go-version-file: 'src/productcatalogservice/go.mod'
                cache-dependency-path: 'src/productcatalogservice/go.sum'
          - uses: actions/golangci-lint-action@v9  
            with:
                working-directory: src/productcatalogservice

          
            


