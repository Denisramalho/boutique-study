name: Build Product Catalog
on:
    push
jobs:
    build_product_catalog:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: baixando dependencias
              working-directory: src/productcatalogservice
              run: go mod download
            - name: build
              working-directory: src/productcatalogservice
              run: go build
            - name: test
              working-directory: src/productcatalogservice
              run: go test

            
  
